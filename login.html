<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SportyStyle</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e2937);
        }
        .login-box {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #22c55e;
            color: #111;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Iniciar Sesión</h2>
            
            <input type="text" id="username" placeholder="Usuario" value="admin">
            <input type="password" id="password" placeholder="Contraseña" value="AdminSport2026!">
            
            <button onclick="loginUser()">Ingresar</button>
            <p id="login-error" style="color:#ef4444; margin-top:10px;"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
